name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'

      - name: Inject Firebase Android config
        env:
          GS_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GS_JSON" ]; then
            echo "Creating google-services.json from secret..."
            printf '%s' "$GS_JSON" > android/app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set. Creating placeholder for build."
            printf '%s' '{"project_info":{"project_number":"123456789012","project_id":"placeholder-project"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789012:android:abcdef1234567890","android_client_info":{"package_name":"com.example.claritycrew"}},"api_key":[{"current_key":"AIzaSyPlaceholder0000000000000000000000000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}]}' > android/app/google-services.json
          fi

      - run: flutter pub get

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: claritycrew-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
