name: Bootstrap Android

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'

      - run: flutter create --platforms=android .

      - uses: actions/upload-artifact@v4
        with:
          name: android-dir
          path: android/
