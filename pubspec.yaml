name: claritycrew
description: An adaptive learning companion for neurodivergent learners.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  video_player: ^2.9.2
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5
  http: ^1.2.2

  # Web platform auto-resolves:
  #   shared_preferences_web, video_player_web,
  #   firebase_core_web, cloud_firestore_web

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/content/subjects.json
    - assets/content/chapters.json
    - assets/content/lessons.json
    - assets/content/videos.json
