name: claritycrew
description: An adaptive learning companion for neurodivergent learners.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/content/subjects.json
    - assets/content/chapters.json
    - assets/content/lessons.json
    - assets/content/videos.json
    - assets/videos/
