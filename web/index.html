<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <meta name="description" content="ClarityCrew - An adaptive learning companion for neurodivergent learners.">
  <title>ClarityCrew</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #F8F9FA; font-family: system-ui, sans-serif; color: #6C757D; flex-direction: column; gap: 16px; }
    #loading .spinner { width: 40px; height: 40px; border: 4px solid #E0F4F0; border-top-color: #2A9D8F; border-radius: 50%; animation: spin 1s linear infinite; }
    #loading span { font-size: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    window.addEventListener('load', function () {
      _flutter.loader.loadEntryPoint({
        serviceWorkerSettings: { serviceWorkerVersion: _flutter.loader.serviceWorkerVersion },
        onEntryPointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading ClarityCrew…</span>
  </div>
</body>
</html>
